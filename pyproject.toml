[tool.black]
line-length = 100
target-version = ["py311"]

[tool.isort]
profile = "black"
line_length = 100

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "ASYNC"]
ignore = [
    "E501",     # line-too-long（由 black 控制）
    "UP042",    # replace-str-enum（str+Enum 兼容性保留）
    "N818",     # error-suffix-on-exception-name（AppException 架构约定）
]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v"

[tool.coverage.run]
source = ["src"]
omit = ["tests/*", "*/migrations/*", "src/main.py", "src/config/hot_reload.py"]

[tool.coverage.report]
show_missing = true
fail_under = 80
