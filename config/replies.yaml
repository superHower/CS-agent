# 回复话术配置文件
# 所有发给买家的固定文本均在此定义，业务代码引用键名

# 兜底话术
fallback:
  greeting: "您好！感谢您的咨询，请问有什么可以帮您的？"
  low_confidence: "您好，您的问题我需要进一步确认，稍后为您解答。"
  error: "非常抱歉，系统繁忙，请稍后再试，或联系人工客服。"

# 转人工话术
escalation:
  notice: "您好，您的问题正在为您转接人工客服，请稍候..."
  waiting: "您好，您的问题已转交人工客服处理，请耐心等待，客服会尽快回复您。"
  keyword_triggered: "您好，您反映的问题已收到，人工客服将尽快联系您处理。"
  timeout: "您好，由于长时间未回复，本次会话已结束，如有需要请重新咨询。"

# 订单相关
order:
  not_found: "抱歉，未找到您的订单信息，请确认订单号后重试。"
  shipping: "您的订单正在配送中，预计{estimated_days}天内送达。"
  delivered: "您的订单已签收，如有问题请及时联系我们。"

# 系统消息
system:
  session_start: "您好，欢迎光临！请问有什么可以帮您？"
  session_end: "感谢您的咨询，祝您购物愉快！如有其他问题随时找我。"
